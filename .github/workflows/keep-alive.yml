name: Supabase keep-alive

# Makes a lightweight query against the database so the free-tier Supabase
# project does not pause after 7 days of inactivity. The scheduled RAWG cache
# refresh does not touch Supabase, so the database needs its own ping.
on:
  schedule:
    - cron: "0 5 */3 * *" # every 3 days at 05:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY repository secrets must be set."
            exit 1
          fi

          status=$(curl -sS \
            -o /tmp/ping-body.txt \
            -w "%{http_code}" \
            -H "apikey: ${SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL%/}/rest/v1/profiles?select=id&limit=1")

          echo "HTTP $status"
          cat /tmp/ping-body.txt
          echo ""

          if [ "$status" != "200" ]; then
            echo "::error::Keep-alive failed with HTTP $status"
            exit 1
          fi
